{% extends 'store/base.html' %}
{% block content %}
<section class="page-head"><p class="eyebrow">Boutique</p><h1>Livres et documents</h1></section>
<form class="filters" method="get"><input name="q" placeholder="Rechercher un document..." value="{{ q }}"><select name="cat"><option value="">Toutes les catégories</option>{% for c in categories %}<option value="{{ c.slug }}" {% if cat == c.slug %}selected{% endif %}>{{ c.name }}</option>{% endfor %}</select><button class="btn" type="submit">Filtrer</button></form>
<section class="section pt0"><div class="grid">{% for book in books %}{% include 'store/partials_book.html' %}{% empty %}<p>Aucun document trouvé.</p>{% endfor %}</div></section>
{% endblock %}
