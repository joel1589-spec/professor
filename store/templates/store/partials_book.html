<article class="book card">
  {% if book.cover %}<img src="{{ book.cover.url }}" alt="{{ book.title }}">{% else %}<div class="cover-fake">{{ book.title|slice:':1' }}</div>{% endif %}
  <div class="book-body">
    <span class="pill">{{ book.get_format_display }}</span>
    <h3>{{ book.title }}</h3>
    <p>{{ book.description|truncatewords:18 }}</p>
    <div class="row"><strong>{{ book.price }} FCFA</strong><a class="btn small" href="{% url 'book_detail' book.slug %}">Détails</a></div>
    <form action="{% url 'add_to_cart' book.id %}" method="post">{% csrf_token %}<button class="btn wide" type="submit">Ajouter au panier</button></form>
  </div>
</article>
