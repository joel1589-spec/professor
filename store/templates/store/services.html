{% extends 'store/base.html' %}{% block content %}<section class="page-head"><p class="eyebrow">Services</p><h1>Services pédagogiques et intellectuels</h1></section><section class="section pt0"><div class="grid">{% for s in services %}<article class="card service-card">{% if s.poster %}<div class="service-poster-wrapper"><img src="{{ s.poster.url }}" alt="{{ s.title }}" class="service-poster" loading="lazy"></div>{% else %}<div class="service-poster-placeholder"><span>📘</span></div>{% endif %}<h3>{{ s.title }}</h3><p>{{ s.description }}</p><strong>{{ s.price_note }}</strong></article>{% empty %}<p>Aucun service publié.</p>{% endfor %}</div></section>{% endblock %}
