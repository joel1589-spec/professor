{% extends 'store/base.html' %}
{% block content %}<section class="page-head"><p class="eyebrow">Biographie</p><h1>Parcours académique et littéraire</h1></section><section class="bio"><div>{% if site.profile_photo %}<img class="portrait-img" src="{{ site.profile_photo.url }}" alt="Photo du professeur">{% else %}<div class="portrait">EP</div>{% endif %}</div><div class="card prose"><h2>{{ site.site_name|default:'Estino Le Passionné' }}</h2><p>{{ site.biography }}</p><div class="stats"><span>Professeur</span><span>Écrivain</span><span>Formateur</span><span>Conférencier</span></div></div></section>{% endblock %}
