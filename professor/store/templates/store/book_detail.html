{% extends 'store/base.html' %}{% block content %}<section class="detail"> <div>{% if book.cover %}<img class="big-cover" src="{{ book.cover.url }}" alt="{{ book.title }}">{% else %}<div class="cover-fake large">{{ book.title|slice:':1' }}</div>{% endif %}</div><div class="card prose"><span class="pill">{{ book.get_format_display }}</span><h1>{{ book.title }}</h1><p>{{ book.description }}</p><h2>{{ book.price }} FCFA</h2><form action="/panier/ajouter/{{ book.id }}/" method="post">{% csrf_token %}<button class="btn" type="submit">Ajouter au panier</button></form></div></section>{% endblock %}
